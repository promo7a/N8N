app = 'n8n-uboljg'
primary_region = 'cdg'

[env]
  N8N_USER_MANAGEMENT_DISABLED = "true"

[http_service]
  internal_port = 5678
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
